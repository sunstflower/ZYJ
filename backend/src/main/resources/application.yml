server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: jsa
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # JDBC URL 兼容参数见 docs/06：编码、时区、SSL、公钥检索
    url: jdbc:mysql://localhost:3306/jsa?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    # 演示机不同时，仅改此处账号密码，勿改代码（见 docs/02 第8节）
    password: 520213

# MyBatis 配置
mybatis:
  # Mapper XML 位置
  mapper-locations: classpath:mapper/*.xml
  # 实体别名包
  type-aliases-package: com.jsa.entity
  configuration:
    # 下划线列名 -> 驼峰属性自动映射（user_id -> userId）
    map-underscore-to-camel-case: true

# AI 健身建议（见 docs/05）。二期接 DeepSeek（OpenAI 兼容 /chat/completions）。
# enabled=true 走 RealAiAdviceService；改回 false 走 MockAiAdviceService（离线演示）。
# api-key 绝不入库：留空走环境变量 AI_API_KEY，或写入 gitignored 的 application-local.yml
# 并以 --spring.profiles.active=local 加载（见 README / docs/05）。
ai:
  enabled: true
  provider: deepseek
  api-key: ${AI_API_KEY:}
  base-url: https://api.deepseek.com
  model: deepseek-chat
  timeout-ms: 30000

logging:
  level:
    com.jsa: debug
